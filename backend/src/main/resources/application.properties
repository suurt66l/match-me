spring.application.name=web
spring.datasource.url=jdbc:postgresql://localhost:5432/webdb
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=mySecretKeyWithAtLeast32CharacctersLongForHS256!
#24 hours in ms
jwt.expiration=86400000
logging.level.org.sprintframework.security=DEBUG

# Max file size
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# directory where uploaded files will be stored
app.upload.dir=${user.home}/web/uploads

# GraphQL Playground
spring.graphql.graphiql.enabled=false